
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPORTS | LEGACY</title>
    <style>
        :root {
            --bg-color: #050507;
            --text-main: #ffffff;
            --neon-green: #39ff14;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .container { max-width: 800px; width: 100%; }

        header { 
            border-left: 3px solid var(--neon-green);
            padding-left: 15px;
            margin-bottom: 40px;
        }

        h1 { letter-spacing: 5px; margin: 0; font-size: 2rem; }

        .step { margin-bottom: 30px; }

        /* Style pour l'image cliquable */
        .video-link {
            display: block;
            position: relative;
            border: 1px solid var(--neon-green);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            text-decoration: none;
        }

        .video-link:hover {
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            transform: scale(1.02);
        }

        .video-link img {
            width: 100%;
            display: block;
            filter: brightness(0.6);
        }

        /* Overlay "Play" */
        .video-link::after {
            content: "▶ REGARDER LA DÉMO";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--neon-green);
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border: 1px solid var(--neon-green);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>LEGACY_REPORT</h1>
        <p style="color: #666;">[ STATUS: DECRYPTED ]</p>
    </header>

    <div class="step">
        <p>Exploitation réussie via MS08-067. Accès SYSTEM obtenu.</p>
    </div>

    <!-- LIEN SUR IMAGE (Remplace l'URL de l'image et de la vidéo) -->
    <a href="https://youtube.com" target="_blank" class="video-link">
        <img src="legacy.png" alt="Miniature Vidéo">
    </a>

    <footer style="margin-top: 50px; font-size: 0.7rem; color: #333; text-align: center;">
        AGENTPATHOGENE_ // DATABASE_2026
    </footer>
</div>

</body>
</html>
