<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Neon Blog</title>
  <style>
    :root {
      --bg: #05010a;
      --neon1: #00f5ff;
      --neon2: #ff00ff;
      --text: #eaeaea;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0b0014, var(--bg));
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 3rem;
      color: var(--neon1);
      text-shadow:
        0 0 5px var(--neon1),
        0 0 15px var(--neon1),
        0 0 30px var(--neon2);
      animation: flicker 2s infinite alternate;
    }

    p.subtitle {
      color: var(--neon2);
      margin-top: 10px;
      font-size: 1.2rem;
      text-shadow: 0 0 10px var(--neon2);
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.1);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px var(--neon1), 0 0 40px var(--neon2);
    }
