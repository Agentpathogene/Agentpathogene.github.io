<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | AgentPathogene</title>

  <style>
    :root {
      --bg-color: #05080f;
      --accent: #00f5ff; 
      --accent-dim: rgba(0, 245, 255, 0.1);
      --text-main: #ffffff;
      --text-dim: #94a3b8;
      --card-bg: #0f172a;
      --line-color: rgba(0, 245, 255, 0.2);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      width: 100%;
      padding: 20px 0;
      background: rgba(5, 8, 15, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-color);
      position: fixed;
      top: 0;
      z-index: 1000;
      text-align: center;
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      margin: 0 20px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    nav a:hover, nav a.active { 
      color: var(--accent); 
      text-shadow: 0 0 10px var(--accent); 
    }

    /* CONTAINER */
    .container {
      max-width: 600px;
      width: 100%;
      padding: 140px 20px 80px;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 0;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

</html>
