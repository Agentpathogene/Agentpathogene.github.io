<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | AgentPathogene</title>

  <style>
    :root {
      --bg-color: #05080f;
      --accent: #00f5ff; 
      --accent-dim: rgba(0, 245, 255, 0.1);
      --text-main: #ffffff;
      --text-dim: #94a3b8;
      --card-bg: #0f172a;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* NAVBAR - Sans bordure basse */
    nav {
      width: 100%;
      padding: 25px 0;
      background: rgba(5, 8, 15, 0.95);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      z-index: 1000;
      text-align: center;
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      margin: 0 20px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    nav a:hover, nav a.active { 
      color: var(--accent); 
      text-shadow: 0 0 10px var(--accent); 
    }

    /* CONTAINER */
    .container {
      max-width: 600px;
      width: 100%;
      padding: 140px 20px 40px;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 3px;
      margin: 0;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-bar {
      font-family: monospace;
      color: var(--accent);
      font-size: 0.8rem;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    /* CARTE - Sans bordure bleue */
    .contact-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .info {
      margin-bottom: 30px;
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .info span {
      display: block;
      color: var(--accent);
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 5px;
    }

    /* FOOTER - Sans bordure haute */
    footer {
      margin-top: auto;
      padding: 40px;
      font-size: 0.75rem;
      color: #4b5563;
      letter-spacing: 2px;
      text-align: center;
      width: 100%;
    }

  </style>
</head>
<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="about.html">Parcours</a>
  <a href="realisations.html">Réalisations</a>
  <a href="contact.html" class="active">Contact</a>
</nav>

<div class="container">
  <header>
    <h1>CONTACT</h1>
    <div class="status-bar">> terminal_session_active</div>
  </header>

  <div class="contact-card">
    <div class="info">
      ADRESSE_EMAIL
      <span>aidaninfo56@gmail.com</span>
    </div>

    <div class="info">
      TELEPHONE_SECURISE
      <span>+32 495 88 73 52</span>
      <small style="display:block; margin-top:10px; opacity:0.6;">
        Note : Les appels masqués sont automatiquement rejetés. Pas d'enregistrement.
      </small>
    </div>
  </div>
</div>

<footer>
  © 2026 | AGENTPATHOGENE | CYBERSECURITY 
</footer>

</body>
</

html>
