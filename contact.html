<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | AgentPathogene</title>

  <style>
    :root {
      --bg-color: #05080f;
      --accent: #00f5ff; 
      --accent-dim: rgba(0, 245, 255, 0.1);
      --text-main: #ffffff;
      --text-dim: #94a3b8;
      --card-bg: #0f172a;
      --line-color: rgba(0, 245, 255, 0.2);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      width: 100%;
      padding: 20px 0;
      background: rgba(5, 8, 15, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-color);
      position: fixed;
      top: 0;
      z-index: 1000;
      text-align: center;
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      margin: 0 20px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    nav a:hover, nav a.active { 
      color: var(--accent); 
      text-shadow: 0 0 10px var(--accent); 
    }

    /* CONTAINER */
    .container {
      max-width: 600px;
      width: 100%;
      padding: 140px 20px 80px;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 0;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-bar {
      font-family: monospace;
      color: var(--accent);
      font-size: 0.8rem;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    /* CARD CONTACT */
    .contact-card {
      background: var(--card-bg);
      border: 1px solid var(--line-color);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,245,255,0.05);
      transition: 0.4s;
    }

    .contact-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0,245,255,0.15);
    }

    .info {
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .info span {
      display: block;
      color: var(--text-main);
      margin-top: 5px;
    }

    form {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      background: transparent;
      border: 1px solid var(--line-color);
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      outline: none;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-dim);
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      background: transparent;
      border: 1px solid var(--accent);
      padding: 12px;
      border-radius: 8px;
      color: var(--accent);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-family: monospace;
      letter-spacing: 1px;
    }

    button:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent);
    }

    footer {
      margin-top: 80px;
      padding: 40px;
      font-size: 0.75rem;
      color: #4b5563;
      letter-spacing: 2px;
      text-align: center;
      border-top: 1px solid var(--line-color);
      width: 100%;
    }

  </style>
</head>
<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="about.html">Parcours</a>
  <a href="realisations.html">Réalisations</a>
  <a href="contact.html" class="active">Contact</a>
</nav>

<div class="container">
  <header>
    <h1>CONTACT</h1>
    <div class="status-bar">> secure_channel_open</div>
  </header>

  <div class="contact-card">

    <div class="info">
      Email
      <span>contact@tonsite.com</span>
    </div>

    <div class="info">
      Téléphone
      <span>+32 123 456 789</span>
    </div>

    <div class="info">
      Localisation
      <span>Belgique | Remote</span>
    </div>

    <form>
      <input type="text" placeholder="Nom" required>
      <input type="email" placeholder="Email" required>
      <textarea placeholder="Votre message" required></textarea>
      <button type="submit">ENVOYER_MESSAGE</button>
    </form>

  </div>
</div>

<footer>
  © 2026 | AGENTPATHOGENE | CYBERSECURITY PORTFOLIO
</footer>

</body>
</html>
