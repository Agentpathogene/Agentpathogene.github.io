<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Cyber Neon</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #050510;
      color: #e0f7ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(0, 0, 20, 0.8);
      border: 1px solid #00eaff;
      box-shadow: 0 0 20px #00eaff, 0 0 40px rgba(0,234,255,0.5);
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
    }

    .info {
      margin: 15px 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .info span {
      display: block;
      margin-top: 5px;
      color: #ffffff;
    }

    form {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, textarea {
      background: transparent;
      border: 1px solid #00eaff;
      padding: 10px;
      border-radius: 8px;
      color: #fff;
      outline: none;
      box-shadow: 0 0 5px #00eaff inset;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(224,247,255,0.5);
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      background: transparent;
      border: 1px solid #00eaff;
      padding: 12px;
</html>
