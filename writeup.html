<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writeups | HTB Database</title>
    <style>
        :root {
            --bg-color: #050507;
            --text-main: #ffffff;
            --text-dim: #888;
            /* Palette Néon */
            --neon-violet: #bc13fe;
            --neon-green: #39ff14;
            --neon-orange: #ff6700;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.12; }

        nav {
            width: 100%;
            padding: 20px 0;
            background: rgba(5, 5, 7, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: fixed;
            top: 0; z-index: 1000;
            text-align: center;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: #fff; }

        .container {
            max-width: 1100px;
            width: 100%;
            padding: 140px 20px 60px;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2rem; letter-spacing: 8px; font-weight: 200; text-transform: uppercase; }

        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* CARTE NÉON FINE */
        .track-card {
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid var(--track-color); /* Bordure très fine */
            border-radius: 4px;
            text-decoration: none;
            color: inherit;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 0 5px var(--track-color);
        }

        .track-card:hover {
            transform: translateY(-5px);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 20px var(--track-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .machine-img {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            transition: 0.3s;
        }

        .track-card:hover .machine-img { opacity: 1; }

        .card-body { padding: 18px; }

        .machine-name {
            font-size: 1.2rem;
            color: var(--track-color);
            margin: 0 0 8px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .track-meta {
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--track-color);
            margin-bottom: 12px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .desc { font-size: 0.8rem; color: #ccc; line-height: 1.4; margin-bottom: 15px; }

        .btn-view {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--track-color);
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer { padding: 40px; color: #222; font-family: monospace; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
    <a href="index.html">Accueil</a>
    <a href="about.html">Parcours</a>
    <a href="realisations.html">Certification</a>
    <a href="contact.html">Contact</a>
    <a href="writeup.html" class="active">Writeups</a>
</nav>

<div class="container">
    <header>
        <h1>DATABASE_FILES</h1>
        <div style="color: #444; font-family: monospace; font-size: 0.8rem;">[ STATUS: DECRYPTING_REPORTS ]</div>
    </header>

    <div class="tracks-grid">

        
        
         <!-- CARTE LEGACY ULTRA-STYLE -->
        <a href="writeups/legacy.html" class="track-card" style="--track-color: var(--neon-green); position: relative; border-radius: 8px; background: rgba(255,255,255,0.02);">
            
            <!-- Logo HTB flottant avec lueur -->
            <div style="position: absolute; top: 15px; right: 15px; z-index: 5; filter: drop-shadow(0 0 8px var(--neon-green));">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--neon-green)">
                    <path d="M12 0L3.6 4.8v14.4L12 24l8.4-4.8V4.8L12 0zm0 2.2l6.6 3.8v12l-6.6 3.8-6.6-3.8v-12L12 2.2zm0 4.6l-4.2 2.4v4.8l4.2 2.4 4.2-2.4V9.2L12 6.8z"/>
                </svg>
            </div>

            <!-- Header Image avec dégradé radial (Focus sur le logo central) -->
            <div class="machine-img" style="
                background-image: radial-gradient(circle, transparent 20%, var(--bg-color) 90%), url('legacy.png'); 
                height: 180px; 
                border-bottom: 2px solid rgba(57, 255, 20, 0.2);">
            </div>
            
            <div class="card-body" style="padding: 20px;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <span style="background: var(--neon-green); color: #000; font-size: 0.6rem; padding: 2px 6px; font-weight: bold; border-radius: 2px;">WIN</span>
                    <span style="color: var(--neon-green); font-family: monospace; font-size: 0.7rem; letter-spacing: 1px;">OS: Windows-XP</span>
                </div>

                <h3 class="machine-name" style="font-size: 1.5rem; text-shadow: 0 0 15px rgba(57, 255, 20, 0.5); margin-bottom: 5px;">LEGACY</h3>
                <p class="desc" style="color: #888; min-height: 40px;">Exploitation NetAPI (MS08-067) pour un accès SYSTEM immédiat.</p>
                
                <!-- Bouton stylisé avec lien explicite -->
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.6rem; color: #444; font-family: monospace;">#MACHINE_EASY</span>
                    <div class="btn-view" style="font-weight: 800; font-size: 0.8rem;">
                        OUVRIR_WRITEUP <span style="margin-left: 5px;">→</span>
                    </div>
                </div>
            </div>

            <!-- Effet de scanline sur la carte -->
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 1; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.3;"></div>
        </a>

        

<footer>
    AGENTPATHOGENE_ // 2026 // WRITEUPS
</footer>

<script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width / 15)).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 7, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#111'; ctx.font = '14px monospace';
        drops.forEach((y, i) => {
            const text = Math.round(Math.random());
            ctx.fillStyle = Math.random() > 0.5 ? '#00f5ff' : '#003333';
            ctx.fillText(text, i * 15, y * 15);
            if (y * 15 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>

</body>
</html>
